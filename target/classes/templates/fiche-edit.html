<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Modifier la fiche</title>

    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/fiche.css">
</head>

<body class="dashboard-body theme-fiche">

<nav class="premium-navbar">
    <div class="nav-brand">🟥 Fiches</div>

    <div class="nav-center">
        <a href="/home" class="nav-link-home">Accueil</a>
        <a href="/fiche" class="nav-link-fiche active">Fiche</a>
        <a href="/cours" class="nav-link-cours">Cours</a>
        <a href="/forum" class="nav-link-entraide">Entraide</a>
        <a href="/planning" class="nav-link-planning">Planning</a>
        <a href="/statistiques" class="nav-link-stats">Statistiques</a>
    </div>

    <div class="nav-actions">
        <a th:if="${isAdmin}" href="/admin" class="admin-btn">ADMIN</a>

        <form th:action="@{/logout}" method="post" class="logout-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="logout-btn">Déconnexion</button>
        </form>
    </div>
</nav>

<main class="fiche-edit-main">
    <div class="fiche-edit-card">
        <div class="fiche-section-header">
            <div>
                <p class="welcome-small">Mode édition</p>
                <h2>Modifier la fiche</h2>
            </div>
        </div>

        <form th:action="@{/fiche/{id}/edit(id=${fiche.id})}" method="post" class="fiche-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="input-group">
                <label>Matière</label>
                <input type="text" name="subject" th:value="${fiche.subject}" required>
            </div>

            <div class="input-group">
                <label>Chapitre</label>
                <input type="text" name="chapter" th:value="${fiche.chapter}" required>
            </div>

            <div class="input-group">
                <label>Thème</label>
                <input type="text" name="theme" th:value="${fiche.theme}" required>
            </div>

            <div class="input-group">
                <label>Contenu HTML de la fiche</label>
                <textarea name="content" class="fiche-editor" required th:text="${fiche.content}"></textarea>
            </div>

            <div class="fiche-edit-actions">
                <a th:href="@{/fiche/{id}(id=${fiche.id})}" class="fiche-secondary-action">Annuler</a>
                <button type="submit" class="fiche-submit-btn">Enregistrer</button>
            </div>
        </form>
    </div>
</main>

</body>
</html>
