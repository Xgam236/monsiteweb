<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${fiche.title}">Fiche</title>

    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/fiche.css">

    <script th:inline="none">
        window.MathJax = {
            tex: {
                inlineMath: [
                    ['\\(', '\\)']
                ],
                displayMath: [
                    ['\\[', '\\]']
                ]
            }
        };
    </script>

    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>

<body class="dashboard-body theme-fiche">

<nav class="premium-navbar">

    <div class="nav-brand">
        🟥 Fiches
    </div>

    <div class="nav-center">
        <a href="/home" class="nav-link-home">Accueil</a>
        <a href="/fiche" class="nav-link-fiche active">Fiche</a>
        <a href="/cours" class="nav-link-cours">Cours</a>
        <a href="/forum" class="nav-link-entraide">Entraide</a>
        <a href="/planning" class="nav-link-planning">Planning</a>
        <a href="/statistiques" class="nav-link-stats">Statistiques</a>
    </div>

    <div class="nav-actions">

        <a th:if="${isAdmin}" href="/admin" class="admin-btn">
            ADMIN
        </a>

        <form th:action="@{/logout}" method="post" class="logout-form">
            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">

            <button type="submit" class="logout-btn">
                Déconnexion
            </button>
        </form>

    </div>

</nav>

<main class="fiche-view-main">

    <div class="fiche-view-topbar">

        <a href="/fiche" class="back-link">
            ← Retour aux fiches
        </a>

        <div class="fiche-view-actions">

            <form th:action="@{/fiche/{id}/favorite(id=${fiche.id})}" method="post">
                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">

                <button type="submit"
                        class="favorite-btn big"
                        th:classappend="${fiche.favorite} ? ' active' : ''">
                    <span th:if="${fiche.favorite}">Retirer des favoris ⭐</span>
                    <span th:if="${!fiche.favorite}">Ajouter aux favoris ☆</span>
                </button>
            </form>

            <a th:href="@{/fiche/{id}/edit(id=${fiche.id})}" class="edit-fiche-btn">
                Modifier
            </a>

            <form th:action="@{/fiche/{id}/delete(id=${fiche.id})}" method="post">
                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">

                <button type="submit"
                        class="delete-fiche-btn"
                        onclick="return confirm('Supprimer cette fiche ?');">
                    Supprimer
                </button>
            </form>

        </div>

    </div>

    <article class="fiche-view-card">

        <div class="fiche-view-header">

            <div>
                <p class="welcome-small">Lecture seule</p>
                <h1 th:text="${fiche.title}">Titre de la fiche</h1>
            </div>

            <div class="fiche-view-meta">
                <span th:text="${fiche.subject}">Matière</span>
                <span th:text="${fiche.chapter}">Chapitre</span>
                <span th:text="${fiche.theme}">Thème</span>
            </div>

        </div>

        <div th:utext="${fiche.content}">
            Contenu de la fiche
        </div>

    </article>

</main>

</body>
</html>
